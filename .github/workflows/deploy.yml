name: Deploy NEXUS to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject Firebase config from secrets
        env:
          API_KEY:     ${{ secrets.FIREBASE_API_KEY }}
          AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID:  ${{ secrets.FIREBASE_PROJECT_ID }}
          SENDER_ID:   ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID:      ${{ secrets.FIREBASE_APP_ID }}
        run: |
          python3 - <<PYEOF
          import os
          config = """window.__NX_CONFIG__ = {{
            apiKey:            "{api_key}",
            authDomain:        "{auth_domain}",
            projectId:         "{project_id}",
            messagingSenderId: "{sender_id}",
            appId:             "{app_id}"
          }};""".format(
            api_key     = os.environ["API_KEY"],
            auth_domain = os.environ["AUTH_DOMAIN"],
            project_id  = os.environ["PROJECT_ID"],
            sender_id   = os.environ["SENDER_ID"],
            app_id      = os.environ["APP_ID"],
          )
          with open("config.js", "w") as f:
            f.write(config)
          print("config.js written — " + str(len(config)) + " bytes")
          PYEOF

      - name: Verify config.js
        run: |
          if [ -f config.js ]; then
            echo "✅ config.js exists ($(wc -c < config.js) bytes)"
          else
            echo "❌ config.js missing"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
