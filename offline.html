<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NEXUS · Offline</title>
  <meta name="theme-color" content="#0d1a1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal: #4ecdc4;
      --bg:   #0d1a1a;
      --text: #cce8e6;
      --text2: #6a9896;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Space Mono', monospace;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Animated hex grid */
    canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      opacity: 0.3; z-index: 0;
    }

    .wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; text-align: center; padding: 32px;
      animation: fade-up 0.6s ease both;
    }
    @keyframes fade-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

    .hex-icon {
      width: 80px; height: 80px;
      animation: hex-glow 2.5s ease-in-out infinite;
    }
    @keyframes hex-glow {
      0%,100% { filter: drop-shadow(0 0 8px rgba(78,205,196,0.4)); }
      50%      { filter: drop-shadow(0 0 20px rgba(78,205,196,0.9)); }
    }
    .hex-icon svg { width: 100%; height: 100%; }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 800; letter-spacing: 8px; color: #fff;
    }

    .status-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.65rem; letter-spacing: 3px; color: var(--text2);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ff6b6b; box-shadow: 0 0 6px #ff6b6b;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    p {
      font-size: 0.78rem; color: var(--text2);
      line-height: 1.8; max-width: 280px; letter-spacing: 0.5px;
    }

    .retry-btn {
      margin-top: 8px; padding: 12px 28px;
      background: linear-gradient(135deg, var(--teal), #3bbfb6);
      border: none; border-radius: 8px;
      color: var(--bg); font-family: 'Syne', sans-serif;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 3px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(78,205,196,0.3);
    }
    .retry-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(78,205,196,0.45); }
    .retry-btn:active { transform: scale(0.97); }

    .enc-note {
      font-size: 0.6rem; color: var(--text2); opacity: 0.5;
      letter-spacing: 2px; margin-top: 4px;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="wrap">
  <div class="hex-icon">
    <svg viewBox="0 0 100 100" fill="none">
      <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5"
               stroke="var(--teal)" stroke-width="3" fill="none"/>
      <polygon points="50,18 80,34 80,66 50,82 20,66 20,34"
               fill="var(--teal)" opacity="0.12"/>
      <text x="50" y="58" text-anchor="middle"
            font-family="Syne" font-weight="800" font-size="22" fill="var(--teal)">NX</text>
    </svg>
  </div>

  <h1>NEXUS</h1>

  <div class="status-row">
    <div class="status-dot"></div>
    <span>CONNECTION LOST</span>
  </div>

  <p>
    You're currently offline.<br/>
    Reconnect to access your private rooms<br/>
    and resume encrypted conversations.
  </p>

  <button class="retry-btn" onclick="window.location.reload()">
    RETRY CONNECTION
  </button>

  <p class="enc-note">◈ ALL DATA STAYS LOCAL UNTIL RECONNECTED</p>
</div>

<script>
  // Mini hex canvas (same as splash background)
  (function() {
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    let W, H, hexes = [];

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
      build();
    }

    function build() {
      hexes = [];
      const size = 26, dx = size * 1.75, dy = size * 1.52;
      for (let row = -1; row < H / dy + 2; row++) {
        for (let col = -1; col < W / dx + 2; col++) {
          hexes.push({
            x: col * dx + (row % 2 === 0 ? 0 : dx / 2),
            y: row * dy,
            alpha: Math.random() * 0.1 + 0.02,
            phase: Math.random() * Math.PI * 2,
            speed: 0.003 + Math.random() * 0.004,
          });
        }
      }
    }

    function hexPath(x, y, r) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 180 * (60 * i - 30);
        i === 0
          ? ctx.moveTo(x + r * Math.cos(a), y + r * Math.sin(a))
          : ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
      }
      ctx.closePath();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      hexes.forEach(h => {
        h.phase += h.speed;
        const a = h.alpha * (0.5 + 0.5 * Math.sin(h.phase));
        ctx.strokeStyle = `rgba(78,205,196,${a})`;
        ctx.lineWidth = 0.8;
        hexPath(h.x, h.y, 24);
        ctx.stroke();
      });
      requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(draw);

    // Auto-retry when back online
    window.addEventListener('online', () => window.location.reload());
  })();
</script>
</body>
</html>
